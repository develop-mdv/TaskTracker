name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/TaskTracker
            git pull
            # Rebuild and restart app container (ensures latest code is used)
            docker compose --profile production up -d --build app
            # Ensure nginx is up (up -d --no-deps preserves external network connections)
            docker compose --profile production up -d --no-deps nginx
            # Ensure nginx stays connected to shared-web network (needed for korpmes.ru proxy)
            docker network connect shared-web tasktracker-nginx-1 2>/dev/null || true
            # Prune unused images to save space
            docker image prune -f
